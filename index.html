<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paperboy Neighborhood Prototype</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1b2430 0%, #11161d 60%, #0a0d12 100%);
      color: #eef2f7;
      font-family: Inter, Arial, sans-serif;
    }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { width: 100%; height: 100%; display: block; }
    .badge {
      position: absolute; left: 18px; top: 18px; z-index: 2;
      background: rgba(11, 16, 22, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 10px 14px; backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,.24);
      pointer-events: none;
    }
    .badge h1 { margin: 0 0 4px; font-size: 16px; font-weight: 700; }
    .badge p { margin: 0; font-size: 12px; color: rgba(255,255,255,.72); }
    .controls {
      position: absolute; right: 18px; top: 18px; z-index: 2;
      background: rgba(11, 16, 22, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 10px 14px; backdrop-filter: blur(6px);
      font-size: 12px; line-height: 1.5; color: rgba(255,255,255,.84);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="badge"><h1>Paperboy · Art Refresh</h1><p>Built with project-source art for roads, houses, and driveways.</p></div>
    <div class="controls">Move: Arrow keys / WASD<br>Throw paper: Space or click/tap</div>
    <canvas id="game"></canvas>
  </div>
  <script type="module" src="./assets/app.js"></script>
</body>
</html>
